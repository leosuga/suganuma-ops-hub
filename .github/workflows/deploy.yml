name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ~
            rm -rf ops-hub
            git clone https://github.com/leosuga/suganuma-ops-hub.git ops-hub
            cd ops-hub

            echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" > .env.prod
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> .env.prod
            echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> .env.prod
            echo "WEBHOOK_SECRET=${{ secrets.WEBHOOK_SECRET }}" >> .env.prod

            echo "=== Cleaning Docker ==="
            docker compose -f docker-compose.prod.yml down -v --remove-orphans 2>/dev/null || true
            docker builder prune -af 2>/dev/null || true
            docker system prune -af 2>/dev/null || true

            echo "=== Building ==="
            docker compose -f docker-compose.prod.yml build --no-cache

            echo "=== Starting ==="
            docker compose -f docker-compose.prod.yml up -d

            echo "=== Waiting for app to be ready ==="
            for i in $(seq 1 30); do
              CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 https://ops.suganuma.com.br/api/health 2>/dev/null || echo "000")
              echo "Health $i: $CODE"
              [ "$CODE" = "200" ] && break
              sleep 5
            done

            echo "=== Verifying new code is live ==="
            SW_CONTENT=$(curl -s --max-time 5 https://ops.suganuma.com.br/sw.js 2>/dev/null | head -c 20 || echo "error")
            echo "sw.js: $SW_CONTENT"
            if echo "$SW_CONTENT" | grep -q "ops-hub-v4"; then
              echo "DEPLOY OK - new SW version detected"
            else
              echo "WARNING: SW still shows old content, but health is OK"
            fi

            docker compose -f docker-compose.prod.yml ps
