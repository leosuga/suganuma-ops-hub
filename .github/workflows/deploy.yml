name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Diagnóstico completo Coolify + Setup
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            TOKEN="${{ secrets.COOLIFY_TOKEN }}"
            BASE="http://localhost:8081/api/v1"

            echo "====================================="
            echo "=== DIAGNÓSTICO COOLIFY COMPLETO ==="
            echo "====================================="

            echo ""
            echo "--- Teams ---"
            TEAMS=$(curl -sS -H "Authorization: Bearer $TOKEN" "$BASE/teams" 2>&1 || echo "[]")
            echo "$TEAMS" | python3 -m json.tool 2>/dev/null || echo "$TEAMS"

            echo ""
            echo "--- Servers ---"
            curl -sS -H "Authorization: Bearer $TOKEN" "$BASE/servers" 2>&1 | python3 -m json.tool 2>/dev/null || echo "(vazio)"

            echo ""
            echo "--- Private Keys ---"
            curl -sS -H "Authorization: Bearer $TOKEN" "$BASE/security/keys" 2>&1 | python3 -m json.tool 2>/dev/null || echo "(vazio)"

            echo ""
            echo "--- Destinations ---"
            curl -sS -H "Authorization: Bearer $TOKEN" "$BASE/destinations" 2>&1 | python3 -m json.tool 2>/dev/null || echo "(vazio)"

            echo ""
            echo "--- Applications ---"
            curl -sS -H "Authorization: Bearer $TOKEN" "$BASE/applications" 2>&1 | python3 -m json.tool 2>/dev/null || echo "(vazio)"

            echo ""
            echo "--- Projects ---"
            curl -sS -H "Authorization: Bearer $TOKEN" "$BASE/projects" 2>&1 | python3 -m json.tool 2>/dev/null || echo "(vazio)"

            echo ""
            echo "=== DIAGNÓSTICO COMPLETO ==="
