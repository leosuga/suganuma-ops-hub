name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via Coolify
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            TOKEN="${{ secrets.COOLIFY_TOKEN }}"
            BASE="http://localhost:8081/api/v1"
            SERVER="vpqzuhhaptcp8dpnl2y0y478"

            echo "=== Validando servidor ==="
            RESP=$(curl -sS -X POST -H "Authorization: Bearer $TOKEN" "$BASE/servers/$SERVER/validate" 2>&1)
            echo "Validate: $RESP"

            echo "=== Criando Project ==="
            PROJ=$(curl -sS -X POST \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"name":"Ops Hub","description":""}' \
              "$BASE/projects" 2>&1)
            echo "Project: $PROJ"
            PROJ_UUID=$(echo "$PROJ" | python3 -c 'import sys,json;print(json.load(sys.stdin).get("uuid",""))' 2>/dev/null || echo "")

            if [ -z "$PROJ_UUID" ]; then
              echo "ERRO: nao conseguiu criar project"
              exit 1
            fi

            echo "Project UUID = $PROJ_UUID"

            ENV_UUID=$(curl -sS -H "Authorization: Bearer $TOKEN" "$BASE/projects/$PROJ_UUID" | python3 -c 'import sys,json; p=json.load(sys.stdin); print(p["environments"][0]["uuid"])' 2>/dev/null || echo "")
            echo "Environment UUID = $ENV_UUID"

            echo "=== Criando Application (Docker Compose) ==="
            APP=$(curl -sS -X POST \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"suganuma-ops-hub\",\"description\":\"\",\"project_uuid\":\"$PROJ_UUID\",\"environment_uuid\":\"$ENV_UUID\",\"server_uuid\":\"$SERVER\",\"docker_compose_domains\":\"ops.suganuma.com.br\"}" \
              "$BASE/applications" 2>&1)
            echo "App: $APP"
            APP_UUID=$(echo "$APP" | python3 -c 'import sys,json;print(json.load(sys.stdin).get("uuid",""))' 2>/dev/null || echo "")
            echo "App UUID = $APP_UUID"

            echo "=== Deploy ==="
            DEPLOY=$(curl -sS -X POST \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              "$BASE/applications/$APP_UUID/start" 2>&1)
            echo "Deploy: $DEPLOY"
