name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via Coolify
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            TOKEN="${{ secrets.COOLIFY_TOKEN }}"
            BASE="http://localhost:8081/api/v1"

            echo "=== DIAGNÓSTICO COOLIFY ==="

            echo "--- Health ---"
            curl -sS "$BASE/health" 2>&1 || true

            echo ""
            echo "--- Projects ---"
            curl -sS -H "Authorization: Bearer $TOKEN" "$BASE/projects" 2>&1 | python3 -m json.tool 2>/dev/null || echo "(vazio/erro)"

            echo ""
            echo "--- Applications ---"
            APPS=$(curl -sS -H "Authorization: Bearer $TOKEN" "$BASE/applications" 2>&1 || echo "[]")
            echo "$APPS" | python3 -m json.tool 2>/dev/null
            echo "$APPS" | python3 -c "
import sys, json
apps = json.load(sys.stdin) if isinstance(json.load(sys.stdin), list) else []
" 2>/dev/null || true
            echo "$APPS" | python3 -c "
import sys, json
data = json.load(sys.stdin)
items = data if isinstance(data, list) else data.get('data', data.get('applications', []))
print(f'Total apps: {len(items)}')
for a in items:
    print(f'  uuid={a.get(\"uuid\")}  name={a.get(\"name\",\"?\")}  status={a.get(\"status\",\"?\")}')
" 2>/dev/null || echo "(parse falhou)"

            echo ""
            echo "--- Services ---"
            curl -sS -H "Authorization: Bearer $TOKEN" "$BASE/services" 2>&1 | python3 -m json.tool 2>/dev/null || echo "(vazio/erro)"
