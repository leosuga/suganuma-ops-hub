name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup and Deploy via Coolify
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            TOKEN="${{ secrets.COOLIFY_TOKEN }}"
            BASE="http://localhost:8081/api/v1"
            SERVER="vpqzuhhaptcp8dpnl2y0y478"

            echo "=== 1. Criando Private Key no Coolify ==="
            python3 -c '
import json, os, subprocess

ssh_key = os.environ["SSH_KEY"]
payload = json.dumps({
    "name": "vps-deploy",
    "description": "VPS SSH key for Coolify",
    "private_key": ssh_key
})
resp = subprocess.check_output(["curl", "-sS", "-X", "POST",
    "-H", f"Authorization: Bearer {os.environ[\"TOKEN\"]}",
    "-H", "Content-Type: application/json",
    "-d", payload,
    "http://localhost:8081/api/v1/security/keys"
]).decode()
print(resp)
try:
    data = json.loads(resp)
    print("KEY_UUID=" + data.get("uuid", ""))
except:
    print("(fallback: trying alternate format)")
' 2>&1 || true
            export SSH_KEY="${{ secrets.VPS_SSH_KEY }}"

            echo ""
            echo "=== 2. Listando keys ==="
            curl -sS -H "Authorization: Bearer $TOKEN" "$BASE/security/keys" | python3 -m json.tool 2>/dev/null || echo "(vazio)"

            echo ""
            echo "=== 3. Validando servidor ==="
            curl -sS -X POST -H "Authorization: Bearer $TOKEN" "$BASE/servers/$SERVER/validate" 2>&1 || true

            echo ""
            echo "=== 4. Status do servidor ==="
            curl -sS -H "Authorization: Bearer $TOKEN" "$BASE/servers/$SERVER" 2>&1 | python3 -c '
import sys, json
s = json.load(sys.stdin)
print(f"reachable={s.get(\"is_reachable\")} usable={s.get(\"is_usable\")}")
' || true
