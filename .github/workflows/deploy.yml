name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Notify start
        run: |
          curl -s -X POST https://ops.suganuma.com.br/api/webhooks/deploy-status \
            -H "Content-Type: application/json" \
            -H "x-hub-signature-256: sha256=$(echo -n '{"status":"started","sha":"${{ github.sha }}"}' | openssl dgst -sha256 -hmac '${{ secrets.WEBHOOK_SECRET }}' | cut -d' ' -f2)" \
            -d '{"status":"started","sha":"${{ github.sha }}"}' || true

      - name: Deploy via Coolify API ou Docker Compose
        id: deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            TOKEN="${{ secrets.COOLIFY_TOKEN }}"
            APP_UUID="${{ secrets.COOLIFY_APP_UUID || 'sw2ag8vuujt87zk04wwbxsvg' }}"
            
            # --- Tentativa 1: Coolify API ---
            for PORT in 9000 8081 3000; do
              COOLIFY="http://localhost:$PORT"
              echo "Testando Coolify em $COOLIFY ..."
              
              # Testa se o endpoint responde
              if curl -s --max-time 3 "$COOLIFY/api/v1/health" > /dev/null 2>&1 || \
                 curl -s --max-time 3 "$COOLIFY/api/v1/version" > /dev/null 2>&1; then
                echo "Porta $PORT responde!"
                
                RESP=$(curl -sS --max-time 10 -X POST \
                  -H "Authorization: Bearer $TOKEN" \
                  -H "Content-Type: application/json" \
                  "$COOLIFY/api/v1/applications/$APP_UUID/start" 2>&1 || true)
                echo "Resposta Coolify [$PORT]: $RESP"
                
                UUID=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('deployment_uuid',''))" 2>/dev/null || true)
                
                if [ -n "$UUID" ]; then
                  echo "Aguardando deployment $UUID ..."
                  for i in $(seq 1 60); do
                    STATUS=$(curl -s --max-time 10 \
                      -H "Authorization: Bearer $TOKEN" \
                      "$COOLIFY/api/v1/deployments/$UUID" \
                      | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || true)
                    echo "[$i/60] status=$STATUS"
                    if [ "$STATUS" = "finished" ]; then
                      echo "Deployment finalizada!"
                      ~/update-ops-proxy.sh
                      DEPLOY_OK=1
                      break 2
                    fi
                    if [ "$STATUS" = "failed" ] || [ "$STATUS" = "cancelled" ]; then
                      echo "Deployment falhou com status=$STATUS"
                      break 2
                    fi
                    sleep 10
                  done
                else
                  echo "Coolify porta $PORT não retornou deployment_uuid"
                fi
              else
                echo "Porta $PORT não responde"
              fi
            done
            
            # --- Tentativa 2: Docker Compose direto (fallback) ---
            if [ -z "$DEPLOY_OK" ]; then
              echo "Coolify API falhou. Tentando docker-compose ..."
              APP_DIR=~/suganuma-ops-hub
              if [ -d "$APP_DIR" ]; then
                cd "$APP_DIR"
                git fetch origin main || true
                git reset --hard origin/main || true
                docker compose -f docker-compose.prod.yml pull || true
                docker compose -f docker-compose.prod.yml up -d --build || true
                ~/update-ops-proxy.sh
                DEPLOY_OK=1
              fi
            fi
            
            if [ -z "$DEPLOY_OK" ]; then
              echo "ERRO: Todas as estratégias de deploy falharam"
              exit 1
            fi
            echo "Deploy concluído com sucesso"

      - name: Verify production health
        run: |
          echo "Verificando saúde em produção..."
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 \
              https://ops.suganuma.com.br/api/health || echo "000")
            echo "Tentativa $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Produção OK!"
              exit 0
            fi
            sleep 10
          done
          echo "Produção não respondeu após 4 minutos" && exit 1

      - name: Notify success
        if: success()
        run: |
          curl -s -X POST https://ops.suganuma.com.br/api/webhooks/deploy-status \
            -H "Content-Type: application/json" \
            -H "x-hub-signature-256: sha256=$(echo -n '{"status":"success","sha":"${{ github.sha }}"}' | openssl dgst -sha256 -hmac '${{ secrets.WEBHOOK_SECRET }}' | cut -d' ' -f2)" \
            -d '{"status":"success","sha":"${{ github.sha }}"}' || true

      - name: Notify failure
        if: failure()
        run: |
          curl -s -X POST https://ops.suganuma.com.br/api/webhooks/deploy-status \
            -H "Content-Type: application/json" \
            -H "x-hub-signature-256: sha256=$(echo -n '{"status":"failure","sha":"${{ github.sha }}","message":"deploy failed"}' | openssl dgst -sha256 -hmac '${{ secrets.WEBHOOK_SECRET }}' | cut -d' ' -f2)" \
            -d '{"status":"failure","sha":"${{ github.sha }}","message":"deploy failed"}' || true
