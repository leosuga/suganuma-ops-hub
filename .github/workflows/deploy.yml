name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Notify start
        run: |
          curl -s -X POST https://ops.suganuma.com.br/api/webhooks/deploy-status \
            -H "Content-Type: application/json" \
            -H "x-hub-signature-256: sha256=$(echo -n '{"status":"started","sha":"${{ github.sha }}"}' | openssl dgst -sha256 -hmac '${{ secrets.WEBHOOK_SECRET }}' | cut -d' ' -f2)" \
            -d '{"status":"started","sha":"${{ github.sha }}"}' || true

      - name: Deploy and update proxy via VPS
        id: deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            TOKEN="${{ secrets.COOLIFY_TOKEN }}"
            COOLIFY="http://localhost:8081"

            echo "========================================"
            echo "=== Debug: verificando API Coolify   ==="
            echo "========================================"

            # Testa health da API
            echo "--- Health check ---"
            curl -s --max-time 5 "$COOLIFY/api/v1/health" || echo "(sem health)"

            # Lista versão
            echo "--- Versão ---"
            curl -s --max-time 5 "$COOLIFY/api/v1/version" || echo "(sem version)"

            # Lista aplicações
            echo "--- Lista de aplicações ---"
            APPS=$(curl -s --max-time 10 -H "Authorization: Bearer $TOKEN" "$COOLIFY/api/v1/applications" || echo "[]")
            echo "$APPS" | python3 -m json.tool 2>/dev/null || echo "$APPS"

            # Procura por aplicação relacionada
            echo "--- Procurando 'suganuma' ou 'ops' ---"
            echo "$APPS" | python3 -c "
import sys, json
apps = json.load(sys.stdin)
for a in apps:
    name = a.get('name','').lower()
    uuid = a.get('uuid','')
    if 'suganuma' in name or 'ops' in name:
        print(f'MATCH: uuid={uuid} name={a.get(\"name\")}')
" 2>/dev/null || echo "(erro no parse)"

            # Pega UUID do secret ou usa o hardcoded
            APP_UUID="${{ secrets.COOLIFY_APP_UUID || 'sw2ag8vuujt87zk04wwbxsvg' }}"
            echo "--- Tentando deploy com UUID='$APP_UUID' ---"

            RESP=$(curl -sS --max-time 10 -X POST \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              "$COOLIFY/api/v1/applications/$APP_UUID/start" || true)
            echo "Resposta: $RESP"

            UUID=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('deployment_uuid',''))" 2>/dev/null || true)
            if [ -z "$UUID" ]; then
              echo "ERRO: deployment_uuid não retornado"
              
              # Última tentativa: listar deployments da app
              echo "--- Listando deployments da app ---"
              curl -s --max-time 10 -H "Authorization: Bearer $TOKEN" \
                "$COOLIFY/api/v1/applications/$APP_UUID/deployments" || echo "(erro)"
              
              exit 1
            fi
            echo "Deploy enfileirado: $UUID"

            for i in $(seq 1 60); do
              STATUS=$(curl -s --max-time 10 \
                -H "Authorization: Bearer $TOKEN" \
                "$COOLIFY/api/v1/deployments/$UUID" \
                | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null) || true
              echo "[$i/60] status=$STATUS"
              [ "$STATUS" = "finished" ]  && echo "Deployment finalizada!" && break
              [ "$STATUS" = "failed" ]    && echo "Deployment falhou!"    && exit 1
              [ "$STATUS" = "cancelled" ] && echo "Deployment cancelada!" && exit 1
              sleep 10
            done
            [ "$STATUS" != "finished" ] && echo "Timeout aguardando deployment" && exit 1

            ~/update-ops-proxy.sh

      - name: Verify production health
        run: |
          echo "Verificando saúde em produção..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://ops.suganuma.com.br/api/health)
            echo "Tentativa $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && echo "Produção OK!" && exit 0
            sleep 5
          done
          echo "Produção não respondeu após atualização do proxy" && exit 1

      - name: Notify success
        if: success()
        run: |
          curl -s -X POST https://ops.suganuma.com.br/api/webhooks/deploy-status \
            -H "Content-Type: application/json" \
            -H "x-hub-signature-256: sha256=$(echo -n '{"status":"success","sha":"${{ github.sha }}"}' | openssl dgst -sha256 -hmac '${{ secrets.WEBHOOK_SECRET }}' | cut -d' ' -f2)" \
            -d '{"status":"success","sha":"${{ github.sha }}"}' || true

      - name: Notify failure
        if: failure()
        run: |
          curl -s -X POST https://ops.suganuma.com.br/api/webhooks/deploy-status \
            -H "Content-Type: application/json" \
            -H "x-hub-signature-256: sha256=$(echo -n '{"status":"failure","sha":"${{ github.sha }}","message":"deploy failed"}' | openssl dgst -sha256 -hmac '${{ secrets.WEBHOOK_SECRET }}' | cut -d' ' -f2)" \
            -d '{"status":"failure","sha":"${{ github.sha }}","message":"deploy failed"}' || true
