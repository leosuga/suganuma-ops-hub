name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cat > /tmp/deploy.sh << 'ENDOFSCRIPT'
            #!/bin/bash
            set -e
            cd "$HOME/ops-hub" 2>/dev/null || { mkdir -p "$HOME/ops-hub" && cd "$HOME/ops-hub"; }

            echo "=== Salvando .env.prod do container atual ==="
            CID=$(docker ps -q --filter "name=app" 2>/dev/null | head -1 || echo "")
            if [ -n "$CID" ]; then
              docker inspect "$CID" --format '{{range .Config.Env}}{{println .}}{{end}}' | grep -E '^(NEXT_PUBLIC_|SUPABASE_|WEBHOOK_)' > .env.prod
              echo "Extraido de container $CID ($(wc -l < .env.prod) vars)"
            elif [ ! -f .env.prod ]; then
              echo "ERRO: sem container rodando e sem .env.prod"; exit 1
            else
              echo "Usando .env.prod existente"
            fi

            echo "=== Git pull ==="
            if [ -d .git ]; then
              git fetch origin main 2>&1 && git reset --hard origin/main 2>&1
            else
              git clone https://github.com/leosuga/suganuma-ops-hub.git . 2>&1
            fi

            echo "=== Docker compose ==="
            docker compose -f docker-compose.prod.yml down 2>&1 || true
            docker compose -f docker-compose.prod.yml up -d --build 2>&1
            docker image prune -f 2>&1 || true

            echo "=== Status ==="
            docker compose -f docker-compose.prod.yml ps
            ENDOFSCRIPT
            bash /tmp/deploy.sh
