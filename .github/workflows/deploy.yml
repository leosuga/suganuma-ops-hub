name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Diagnosticar e Configurar Coolify
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            TOKEN="${{ secrets.COOLIFY_TOKEN }}"
            B="http://localhost:8081/api/v1"
            
            echo "================================================"
            echo "=== DIAGNÓSTICO COMPLETO DO COOLIFY          ==="
            echo "================================================"
            
            echo ""
            echo "--- Health Check ---"
            curl -sS "$B/health"
            
            echo ""
            echo "--- Servers ---"
            curl -sS -H "Authorization: Bearer $TOKEN" "$B/servers" | python3 -m json.tool
            
            echo ""
            echo "--- Projects ---"
            curl -sS -H "Authorization: Bearer $TOKEN" "$B/projects" | python3 -m json.tool
            
            echo ""
            echo "--- Applications ---"
            curl -sS -H "Authorization: Bearer $TOKEN" "$B/applications" | python3 -m json.tool
            
            echo ""
            echo "--- Security Keys ---"
            curl -sS -H "Authorization: Bearer $TOKEN" "$B/security/keys" | python3 -m json.tool
            
            echo ""
            echo "--- Teams ---"
            curl -sS -H "Authorization: Bearer $TOKEN" "$B/teams" | python3 -m json.tool
            
            echo ""
            echo "--- Docker containers rodando ---"
            docker ps -a --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}' 2>/dev/null || echo "(sem docker)"
            
            echo ""
            echo "--- Containers Coolify ---"
            docker ps -a --filter "name=coolify" --format '{{.Names}} {{.Image}} {{.Status}}' 2>/dev/null || echo "(sem)"
            
            echo ""
            echo "=== FIM DIAGNÓSTICO ==="
