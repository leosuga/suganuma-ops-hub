name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m
          script: |
            cd ~
            [ -d ops-hub ] && rm -rf ops-hub
            git clone --depth 1 https://github.com/leosuga/suganuma-ops-hub.git ops-hub
            cd ops-hub

            echo NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} > .env.prod
            echo NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} >> .env.prod
            echo SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }} >> .env.prod
            echo WEBHOOK_SECRET=${{ secrets.WEBHOOK_SECRET }} >> .env.prod

            OLD=$(docker ps -q --filter "name=sw2ag8vuujt87zk04wwbxsvg" 2>/dev/null || echo "")
            if [ -n "$OLD" ]; then
              NET=$(docker inspect "$OLD" --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}}{{end}}')
            else
              NET=$(docker inspect caddy_proxy --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}}{{end}}' 2>/dev/null || echo caddy_default)
            fi
            echo "Using network: $NET"

            docker build \
              --build-arg NEXT_PUBLIC_SUPABASE_URL="${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" \
              --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
              -t ops-hub:latest .

            [ -n "$OLD" ] && docker stop "$OLD" && docker rm "$OLD"
            docker stop suganuma-ops-hub 2>/dev/null && docker rm suganuma-ops-hub 2>/dev/null || true

            docker run -d --name suganuma-ops-hub --network "$NET" --env-file .env.prod --restart unless-stopped ops-hub:latest

            [ -f ~/update-ops-proxy.sh ] && bash ~/update-ops-proxy.sh || true

            sleep 10
            SW=$(curl -s --max-time 5 https://ops.suganuma.com.br/sw.js 2>/dev/null | head -c 30 || echo "-")
            echo "sw.js: $SW"
            echo "$SW" | grep -q "v4" && echo "DEPLOY OK - v4 found!"
