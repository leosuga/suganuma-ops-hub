name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Create SSH key and validate server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            TOKEN="${{ secrets.COOLIFY_TOKEN }}"
            BASE="http://localhost:8081/api/v1"
            SERVER="vpqzuhhaptcp8dpnl2y0y478"

            echo "=== Step 1: Write SSH key to temp file ==="
            cat > /tmp/key.pem << 'EOFKEY'
${{ secrets.VPS_SSH_KEY }}
EOFKEY

            echo "Key file size: $(wc -c < /tmp/key.pem) bytes"

            echo "=== Step 2: Build JSON payload and create key via API ==="

            python3 << 'PYEOF'
import json, subprocess, os

with open("/tmp/key.pem") as f:
    key_content = f.read()

payload = {
    "name": "vps-key",
    "description": "VPS deploy SSH key",
    "private_key": key_content
}

with open("/tmp/payload.json", "w") as f:
    json.dump(payload, f)

print("Payload JSON size:", os.path.getsize("/tmp/payload.json"), "bytes")

resp = subprocess.check_output([
    "curl", "-sS", "-X", "POST",
    "-H", "Authorization: Bearer " + os.environ["TOKEN"],
    "-H", "Content-Type: application/json",
    "-d", "@/tmp/payload.json",
    "http://localhost:8081/api/v1/security/keys"
], stderr=subprocess.STDOUT).decode()

print("API response:", resp[:500])
PYEOF

            echo "=== Step 3: List all private keys ==="
            curl -sS -H "Authorization: Bearer $TOKEN" "$BASE/security/keys" 2>&1 | python3 -m json.tool 2>/dev/null || echo "(vazio)"

            echo "=== Step 4: Validate server ==="
            curl -sS -X POST -H "Authorization: Bearer $TOKEN" "$BASE/servers/$SERVER/validate" 2>&1 || echo "(validate falhou)"

            echo "=== Step 5: Server status ==="
            curl -sS -H "Authorization: Bearer $TOKEN" "$BASE/servers/$SERVER" 2>&1 | python3 -c '
import sys, json
s = json.load(sys.stdin)
print(f"reachable={s.get(\"is_reachable\")} usable={s.get(\"is_usable\")}")
' || echo "(status parse falhou)"
