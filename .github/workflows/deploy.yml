name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Notify start
        run: |
          curl -s -X POST https://ops.suganuma.com.br/api/webhooks/deploy-status \
            -H "Content-Type: application/json" \
            -H "x-hub-signature-256: sha256=$(echo -n '{"status":"started","sha":"${{ github.sha }}"}' | openssl dgst -sha256 -hmac '${{ secrets.WEBHOOK_SECRET }}' | cut -d' ' -f2)" \
            -d '{"status":"started","sha":"${{ github.sha }}"}'

      - name: Deploy and update proxy via VPS
        id: deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            TOKEN="${{ secrets.COOLIFY_TOKEN }}"
            APP_UUID="sw2ag8vuujt87zk04wwbxsvg"
            COOLIFY="http://localhost:9000"

            RESP=$(curl -sS -X POST \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              "$COOLIFY/api/v1/applications/$APP_UUID/start")
            echo "Resposta: $RESP"
            UUID=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('deployment_uuid',''))" 2>/dev/null) || true
            if [ -z "$UUID" ]; then
              echo "ERRO: deployment_uuid não retornado"; exit 1
            fi
            echo "Deploy enfileirado: $UUID"

            for i in $(seq 1 60); do
              STATUS=$(curl -s \
                -H "Authorization: Bearer $TOKEN" \
                "$COOLIFY/api/v1/deployments/$UUID" \
                | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null) || true
              echo "[$i/60] status=$STATUS"
              [ "$STATUS" = "finished" ]  && echo "Deployment finalizada!" && break
              [ "$STATUS" = "failed" ]    && echo "Deployment falhou!"    && exit 1
              [ "$STATUS" = "cancelled" ] && echo "Deployment cancelada!" && exit 1
              sleep 10
            done
            [ "$STATUS" != "finished" ] && echo "Timeout aguardando deployment" && exit 1

            ~/update-ops-proxy.sh

      - name: Verify production health
        run: |
          echo "Verificando saúde em produção..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://ops.suganuma.com.br/api/health)
            echo "Tentativa $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && echo "Produção OK!" && exit 0
            sleep 5
          done
          echo "Produção não respondeu após atualização do proxy" && exit 1

      - name: Notify success
        if: success()
        run: |
          curl -s -X POST https://ops.suganuma.com.br/api/webhooks/deploy-status \
            -H "Content-Type: application/json" \
            -H "x-hub-signature-256: sha256=$(echo -n '{"status":"success","sha":"${{ github.sha }}"}' | openssl dgst -sha256 -hmac '${{ secrets.WEBHOOK_SECRET }}' | cut -d' ' -f2)" \
            -d '{"status":"success","sha":"${{ github.sha }}"}'

      - name: Notify failure
        if: failure()
        run: |
          curl -s -X POST https://ops.suganuma.com.br/api/webhooks/deploy-status \
            -H "Content-Type: application/json" \
            -H "x-hub-signature-256: sha256=$(echo -n '{"status":"failure","sha":"${{ github.sha }}","message":"deploy failed"}' | openssl dgst -sha256 -hmac '${{ secrets.WEBHOOK_SECRET }}' | cut -d' ' -f2)" \
            -d '{"status":"failure","sha":"${{ github.sha }}","message":"deploy failed"}'
