name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy repo to VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "."
          target: "~/suganuma-ops-hub"
          rm: true
          # Não copia node_modules e .git para acelerar
          exclude: "node_modules,.git,.next"

      - name: Build and restart on VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ~/suganuma-ops-hub

            # Gerar .env.prod a partir de secrets (nunca commite .env.prod)
            cat > .env.prod <<EOF
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            WEBHOOK_SECRET=${{ secrets.WEBHOOK_SECRET }}
            EOF

            echo "=== Verificando Docker ==="
            docker -v
            docker compose version

            echo "=== Build e restart ==="
            docker compose -f docker-compose.prod.yml down || true
            docker compose -f docker-compose.prod.yml up -d --build

            echo "=== Cleanup ==="
            docker image prune -f || true
            docker builder prune -f || true

            echo "=== Status ==="
            docker compose -f docker-compose.prod.yml ps
            echo "Deploy concluído!"

      - name: Verify production health
        run: |
          echo "Verificando saúde em produção..."
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 \
              https://ops.suganuma.com.br/api/health || echo "000")
            echo "Tentativa $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Produção OK!"
              exit 0
            fi
            sleep 10
          done
          echo "Produção não respondeu após 4 minutos" && exit 1
