name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deploy
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://coolify.suganuma.com.br/api/v1/applications/sw2ag8vuujt87zk04wwbxsvg/start"

      - name: Wait for Coolify build
        run: |
          echo "Aguardando Coolify terminar o build (timeout 5 min)..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
              "https://coolify.suganuma.com.br/api/v1/applications/sw2ag8vuujt87zk04wwbxsvg" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null)
            echo "Tentativa $i: status=$STATUS"
            [[ "$STATUS" = "running:healthy" || "$STATUS" = "running:unknown" ]] && echo "Container up no Coolify ($STATUS)!" && exit 0
            sleep 10
          done
          echo "Timeout aguardando Coolify — continuando de qualquer forma..."

      - name: Update Caddy proxy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: ~/update-ops-proxy.sh

      - name: Verify production health
        run: |
          echo "Verificando saúde em produção..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://ops.suganuma.com.br/api/health)
            echo "Tentativa $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && echo "Produção OK!" && exit 0
            sleep 5
          done
          echo "Produção não respondeu após atualização do proxy" && exit 1
