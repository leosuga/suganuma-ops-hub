name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via Coolify
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            TOKEN="${{ secrets.COOLIFY_TOKEN }}"
            BASE="http://localhost:8081/api/v1"

            echo "=== DIAGNÓSTICO COOLIFY ==="

            echo "--- Health ---"
            curl -sS "$BASE/health" 2>&1 || echo "(sem health)"

            echo ""
            echo "--- Listando aplicações ---"
            curl -sS -H "Authorization: Bearer $TOKEN" "$BASE/applications" 2>&1 | python3 -m json.tool 2>/dev/null || true

            echo ""
            echo "--- Listando projects ---"
            curl -sS -H "Authorization: Bearer $TOKEN" "$BASE/projects" 2>&1 | python3 -m json.tool 2>/dev/null || true

            echo ""
            echo "--- Listando services ---"
            curl -sS -H "Authorization: Bearer $TOKEN" "$BASE/services" 2>&1 | python3 -m json.tool 2>/dev/null || true
