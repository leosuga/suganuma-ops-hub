name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deploy
        id: trigger
        run: |
          RESP=$(curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://coolify.suganuma.com.br/api/v1/applications/sw2ag8vuujt87zk04wwbxsvg/start")
          echo "Resposta: $RESP"
          UUID=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('deployment_uuid',''))")
          if [ -z "$UUID" ]; then
            echo "ERRO: deployment_uuid não retornado"; exit 1
          fi
          echo "deployment_uuid=$UUID" >> "$GITHUB_OUTPUT"
          echo "Deploy enfileirado: $UUID"

      - name: Wait for deployment to finish
        run: |
          UUID="${{ steps.trigger.outputs.deployment_uuid }}"
          echo "Aguardando deployment $UUID (timeout 10 min)..."
          for i in $(seq 1 60); do
            STATUS=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
              "https://coolify.suganuma.com.br/api/v1/deployments/$UUID" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null)
            echo "[$i/60] status=$STATUS"
            case "$STATUS" in
              finished)         echo "Deployment finalizada com sucesso"; exit 0 ;;
              failed|cancelled) echo "Deployment falhou: $STATUS"; exit 1 ;;
            esac
            sleep 10
          done
          echo "Timeout aguardando deployment"; exit 1

      - name: Update Caddy proxy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: ~/update-ops-proxy.sh

      - name: Verify production health
        run: |
          echo "Verificando saúde em produção..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://ops.suganuma.com.br/api/health)
            echo "Tentativa $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && echo "Produção OK!" && exit 0
            sleep 5
          done
          echo "Produção não respondeu após atualização do proxy" && exit 1
