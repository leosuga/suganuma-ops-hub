name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via Coolify
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            TOKEN="${{ secrets.COOLIFY_TOKEN }}"
            BASE="http://localhost:8081/api/v1"

            echo "=== APPS ==="
            curl -sS -H "Authorization: Bearer $TOKEN" "$BASE/applications" | python3 -m json.tool

            echo ""
            echo "=== PROJECTS ==="
            curl -sS -H "Authorization: Bearer $TOKEN" "$BASE/projects" | python3 -m json.tool

            echo ""
            echo "=== SERVERS ==="
            curl -sS -H "Authorization: Bearer $TOKEN" "$BASE/servers" | python3 -c '
import sys, json
servers = json.load(sys.stdin)
for s in servers:
    print(f"uuid={s[\"uuid\"]} name={s[\"name\"]} ip={s[\"ip\"]} reachable={s[\"is_reachable\"]} usable={s[\"is_usable\"]}")
'
